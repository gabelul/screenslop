name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 24]
    name: Node ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: node --check bin/screenslop.mjs
      - run: |
          find src tests scripts -name '*.mjs' -print0 | xargs -0 -n1 node --check
      - run: npm test
      - run: npm run --silent smoke:e2e -- --fresh-mode fixed
      - run: node bin/screenslop.mjs matrix --dry-run --json
      - run: node bin/screenslop.mjs matrix --profile examples/matrix/default.json --json
      - run: npm pack --dry-run
